{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        OCS Login
    </title>

    <!-- Bootstrap -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <style>

        :root {

            --primary-orange: #f97316;
            --deep-orange: #ea580c;
            --accent-red: #dc2626;

            --bg-gradient-1: #111827;
            --bg-gradient-2: #0f172a;
            --bg-gradient-3: #7c2d12;

            --header-bg: rgba(17, 24, 39, 0.92);

            --card-bg: rgba(31, 41, 55, 0.92);

            --text-primary: #f9fafb;
            --text-secondary: #d1d5db;

            --input-bg: rgba(17, 24, 39, 0.95);

            --input-border: #374151;

            --shadow-color: rgba(0, 0, 0, 0.45);
        }

        * {

            margin: 0;
            padding: 0;

            box-sizing: border-box;

            transition:
                background-color 0.3s ease,
                border-color 0.3s ease,
                color 0.3s ease,
                transform 0.3s ease;
        }

        body {

            min-height: 100vh;

            overflow: hidden;

            position: relative;

            font-family:
                "Segoe UI",
                Tahoma,
                Geneva,
                Verdana,
                sans-serif;

            background:
                linear-gradient(
                    135deg,
                    var(--bg-gradient-1),
                    var(--bg-gradient-2),
                    var(--bg-gradient-3)
                );
        }

        /* =======================================================
           DECORATIVE BACKGROUND
        ======================================================= */

        body::before {

            content: "";

            position: absolute;

            width: 500px;
            height: 500px;

            top: -180px;
            right: -120px;

            border-radius: 50%;

            background:
                rgba(249,115,22,0.08);

            filter: blur(20px);
        }

        body::after {

            content: "";

            position: absolute;

            width: 400px;
            height: 400px;

            bottom: -150px;
            left: -100px;

            border-radius: 50%;

            background:
                rgba(220,38,38,0.08);

            filter: blur(20px);
        }

        /* =======================================================
           HEADER
        ======================================================= */

        .official-header {

            position: fixed;

            top: 0;
            left: 0;

            width: 100%;
            height: 74px;

            background: var(--header-bg);

            backdrop-filter: blur(18px);

            border-bottom:
                1px solid rgba(255,255,255,0.06);

            display: flex;
            align-items: center;
            justify-content: space-between;

            padding:
                0 50px;

            z-index: 1000;
        }

        .header-left {

            display: flex;

            flex-direction: column;
        }

        .header-left h1 {

            margin: 0;

            font-size: 1.5rem;

            font-weight: 800;

            color: white;

            letter-spacing: 0.3px;
        }

        .header-left span {

            margin-top: 2px;

            font-size: 0.85rem;

            color: var(--text-secondary);

            font-weight: 500;
        }

        /* =======================================================
           LOGIN WRAPPER
        ======================================================= */

        .login-wrapper {

            min-height: 100vh;

            display: flex;

            align-items: center;
            justify-content: center;

            padding:
                120px 20px 40px;

            position: relative;

            z-index: 2;
        }

        /* =======================================================
           LOGIN CARD
        ======================================================= */

        .login-card {

            width: 100%;
            max-width: 430px;

            border-radius: 28px;

            background: var(--card-bg);

            border:
                1px solid rgba(255,255,255,0.08);

            backdrop-filter: blur(18px);

            box-shadow:
                0 15px 45px var(--shadow-color);

            overflow: hidden;
        }

        .card-body {

            padding:
                2.7rem !important;
        }

        /* =======================================================
           TITLE
        ======================================================= */

        .login-title {

            text-align: center;

            margin-bottom: 2.2rem;
        }

        .login-title h3 {

            margin-bottom: 10px;

            font-size: 2rem;

            font-weight: 800;

            color: white;
        }

        .login-title p {

            color: var(--text-secondary);

            font-size: 0.96rem;
        }

        .login-title::after {

            content: "";

            display: block;

            width: 75px;
            height: 4px;

            margin:
                16px auto 0;

            border-radius: 999px;

            background:
                linear-gradient(
                    to right,
                    var(--primary-orange),
                    var(--accent-red)
                );
        }

        /* =======================================================
           LABELS
        ======================================================= */

        .form-label {

            font-size: 0.92rem;

            font-weight: 700;

            color: var(--text-secondary);

            margin-bottom: 9px;
        }

        /* =======================================================
           INPUTS
        ======================================================= */

        .form-control {

            height: 52px;

            border-radius: 14px;

            border:
                1px solid var(--input-border);

            background: var(--input-bg);

            color: white;

            padding:
                12px 16px;

            font-size: 0.95rem;
        }

        .form-control::placeholder {

            color:
                #9ca3af;
        }

        .form-control:focus {

            background: var(--input-bg);

            color: white;

            border-color:
                var(--primary-orange);

            box-shadow:
                0 0 0 4px rgba(249,115,22,0.14);
        }

        /* =======================================================
           BUTTON
        ======================================================= */

        .btn-login {

            width: 100%;

            height: 52px;

            border: none;

            border-radius: 14px;

            background:
                linear-gradient(
                    to right,
                    var(--primary-orange),
                    var(--deep-orange)
                );

            color: white;

            font-size: 1rem;

            font-weight: 700;

            letter-spacing: 0.3px;

            box-shadow:
                0 8px 20px rgba(249,115,22,0.22);
        }

        .btn-login:hover {

            transform:
                translateY(-2px);

            background:
                linear-gradient(
                    to right,
                    #fb923c,
                    #ea580c
                );

            box-shadow:
                0 12px 24px rgba(249,115,22,0.28);
        }

        /* =======================================================
           ALERT
        ======================================================= */

        .alert {

            border: none;

            border-radius: 12px;

            background:
                rgba(220,38,38,0.12);

            color:
                #fca5a5;

            font-weight: 600;

            padding:
                12px 16px;
        }

        /* =======================================================
           MOBILE
        ======================================================= */

        @media (max-width: 768px) {

            .official-header {

                padding:
                    0 20px;
            }

            .header-left h1 {

                font-size: 1.15rem;
            }

            .header-left span {

                font-size: 0.75rem;
            }

            .login-wrapper {

                padding-top: 100px;
            }

            .card-body {

                padding:
                    2rem !important;
            }

            .login-title h3 {

                font-size: 1.7rem;
            }
        }

    </style>

</head>

<body>

    <!-- =======================================================
         HEADER
    ======================================================== -->

    <header class="official-header">

        <div class="header-left">

            <h1>
                Office of Career Services
            </h1>

            <span>
                Room Booking Management Portal
            </span>

        </div>

    </header>

    <!-- =======================================================
         LOGIN SECTION
    ======================================================== -->

    <div class="container login-wrapper">

        <div class="login-card">

            <div class="card-body">

                <!-- TITLE -->

                <div class="login-title">

                    <h3>
                        Welcome Back
                    </h3>

                    <p>
                        Sign in to continue to the portal
                    </p>

                </div>

                <!-- ERROR -->

                {% if error %}

                <div
                    class="alert text-center mb-4"
                    role="alert"
                >

                    {{ error }}

                </div>

                {% endif %}

                <!-- FORM -->

                <form method="POST">

                    {% csrf_token %}

                    <!-- USERNAME -->

                    <div class="mb-3">

                        <label class="form-label">

                            Username

                        </label>

                        <input
                            type="text"
                            name="username"
                            class="form-control"
                            placeholder="Enter your username"
                            required
                        >

                    </div>

                    <!-- PASSWORD -->

                    <div class="mb-4">

                        <label class="form-label">

                            Password

                        </label>

                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            placeholder="Enter your password"
                            required
                        >

                    </div>

                    <!-- BUTTON -->

                    <button
                        type="submit"
                        class="btn btn-login"
                    >

                        Log In

                    </button>

                </form>

            </div>

        </div>

    </div>

</body>

</html>
